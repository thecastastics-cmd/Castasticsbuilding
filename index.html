<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Castastics Channel</title>
    <style>
        body { background: #000; color: #ffcc00; font-family: 'Arial Black', sans-serif; margin: 0; padding: 20px; text-align: center; }
        h1 { font-size: 3rem; text-shadow: 2px 2px #333; margin-bottom: 10px; }
        .container { max-width: 1000px; margin: auto; }
        
        /* Video Player Area */
        #video-display { background: #111; padding: 20px; border: 4px solid #ffcc00; border-radius: 15px; margin-bottom: 40px; display: none; }
        video { width: 100%; border-radius: 5px; }
        #now-playing { margin-top: 10px; font-size: 1.2rem; text-transform: uppercase; }

        /* Grid Layout */
        .section-title { border-bottom: 2px solid #ffcc00; padding: 10px; margin: 40px 0 20px; font-size: 1.5rem; }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .card { width: 180px; background: #1a1a1a; padding: 10px; border-radius: 10px; border: 2px solid #333; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: #ffcc00; transform: scale(1.05); }
        .card img { width: 100%; height: 250px; object-fit: cover; border-radius: 5px; }
        .card p { margin: 10px 0 5px; font-size: 0.9rem; }
        
        /* Dropdown Styling */
        select { background: #ffcc00; border: none; padding: 5px; border-radius: 5px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <h1>THE CASTASTICS CHANNEL</h1>

        <div id="video-display">
            <video id="main-player" controls>
                <source id="video-src" src="" type="video/mp4">
            </video>
            <div id="now-playing"></div>
        </div>

        <div class="section-title">MOVIES</div>
        <div class="grid">
            <div class="card" onclick="playMedia('G_DRIVE_LINK_HERE', 'Movie 1 Name')">
                <img src="posters/movie1.jpg" alt="Movie 1">
                <p>Movie 1 Name</p>
            </div>
            </div>

        <div class="section-title">TV SHOWS</div>
        <div class="grid">
            
            <div class="card">
                <img src="posters/castastics_show.jpg" alt="The Castastics">
                <p>The Castastics</p>
                <select onchange="playMedia(this.value, 'The Castastics')">
                    <option value="">Select Episode</option>
                    <optgroup label="Season 1">
                        <option value="videos/castastics/s1/ep1.mp4">Episode 1</option>
                        <option value="videos/castastics/s1/ep2.mp4">Episode 2</option>
                    </optgroup>
                    <optgroup label="Season 2">
                        <option value="videos/castastics/s2/ep1.mp4">Episode 1</option>
                    </optgroup>
                    </select>
            </div>

            <div class="card">
                <img src="posters/idiotastics_show.jpg" alt="The Idiotastics">
                <p>The Idiotastics</p>
                <select onchange="playMedia(this.value, 'The Idiotastics')">
                    <option value="">Select Episode</option>
                    <optgroup label="Season 1">
                        <option value="videos/idiotastics/s1/ep1.mp4">Episode 1</option>
                    </optgroup>
                    </select>
            </div>

        </div>
    </div>

    <script>
        function playMedia(link, title) {
            if (!link) return;
            const display = document.getElementById('video-display');
            const player = document.getElementById('main-player');
            const source = document.getElementById('video-src');
            const text = document.getElementById('now-playing');

            display.style.display = "block";
            source.src = link;
            text.innerText = "NOW PLAYING: " + title;
            
            player.load();
            player.play();
            window.scrollTo({top: 0, behavior: 'smooth'});
        }
    </script>
</body>
</html>
