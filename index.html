<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Castastics Channel</title>
    <style>
        body { background: #000; color: #ffcc00; font-family: 'Arial Black', sans-serif; margin: 0; padding: 20px; text-align: center; }
        h1 { font-size: 3rem; text-shadow: 2px 2px #333; margin-bottom: 10px; text-transform: uppercase; }
        .container { max-width: 1100px; margin: auto; }
        
        /* THE DYNAMIC PLAYER AREA */
        #video-display { 
            background: #111; 
            padding: 10px; 
            border: 4px solid #ffcc00; 
            border-radius: 15px; 
            margin-bottom: 40px; 
            display: none; 
            overflow: hidden;
            width: fit-content;
            max-width: 95%;
            margin-left: auto;
            margin-right: auto;
        }
        
        /* This makes the video fit perfectly without being too big */
        video { 
            width: 100%; 
            max-width: 900px;
            height: auto; 
            max-height: 80vh; 
            border-radius: 5px; 
            box-shadow: 0 0 15px #ffcc00;
            display: block;
        }

        #now-playing { margin-top: 15px; font-size: 1.2rem; text-transform: uppercase; color: #fff; padding-bottom: 10px; }

        /* SECTIONS & GRID */
        .section-title { border-bottom: 3px solid #ffcc00; padding: 10px; margin: 40px 0 20px; font-size: 1.8rem; text-align: left; }
        .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        
        .card { width: 170px; background: #1a1a1a; padding: 10px; border-radius: 10px; border: 2px solid #333; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: #ffcc00; transform: scale(1.05); }
        .card img { width: 100%; height: 240px; object-fit: cover; border-radius: 5px; margin-bottom: 10px; }
        .card p { margin: 5px 0; font-size: 0.85rem; color: #fff; height: 35px; overflow: hidden; }
        
        select { background: #ffcc00; border: none; padding: 8px; border-radius: 5px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 5px; font-family: sans-serif; }
    </style>
</head>
<body>

    <div class="container">
        <h1>THE CASTASTICS CHANNEL</h1>

        <div id="video-display">
            <div id="player-container"></div>
            <div id="now-playing">SELECT A STORY TO START</div>
        </div>

        <div class="section-title">MOVIES (9)</div>
        <div class="grid">
            <div class="card" onclick="playMedia('https://www.dropbox.com/scl/fi/asw36zly5e8gtoaiqtw8s/The-Castastics-Movie.mp4?rlkey=nqqr5pzt0u41pp4flh3e35u2l&st=e5w5jr2p&raw=1', 'The Castastics Movie')">
                <img src="posters/movie1.jpg"><p>Movie 1</p>
            </div>
            
            <div class="card" onclick="playMedia('https://www.dropbox.com/scl/fi/3qisp19s9zd7c0cf46hlm/The-Castastics-2_-Into-The-CastasticVerse-Full-Movie.mp4?rlkey=5cewkcfmpppi4t0h60s6pgpde&st=829h902b&raw=1', 'The Castastics 2: Into The CastasticVerse')"><img src="posters/movie2.jpg"><p>Movie 2</p></div>
            <div class="card" onclick="playMedia('https://www.dropbox.com/scl/fi/2tovxadce8bp9dwah4gah/The-Castastics-3_-Brookhaven-Full-Movie.mp4?rlkey=0m66e3wflx5tjlaroph9eyocj&st=gg8ermz6&raw=1', 'The Castastics 3: Brookhaven')"><img src="posters/movie3.jpg"><p>Movie 3</p></div>
            <div class="card" onclick="playMedia('https://www.dropbox.com/scl/fi/9qadd7cooyx87pe8g9ano/The-Castastics-4_-Castastic-Heroes-FULL-MOVIE.mp4?rlkey=kgc216e0vk856qjf45jmwt866&st=09l357jj&raw=1', 'The Castastics 4: Castastic Heroes')"><img src="posters/movie4.jpg"><p>Movie 4</p></div>
            <div class="card" onclick="playMedia('https://www.dropbox.com/scl/fi/gqg8okmhswfvc43pvh5mw/The-Castastics-5_-The-Final-Battle.mp4?rlkey=nytboa0t5gyndninod65inovf&st=1udj3j8x&raw=1', 'The Castastics 5: The Final Battle')"><img src="posters/movie5.jpg"><p>Movie 5</p></div>
            <div class="card" onclick="playMedia('https://www.dropbox.com/scl/fi/3gftio24dikq9fkhwtccm/The-Super-Toys-A-Castastics-Story.mp4?rlkey=01gzkpx99jw9r5fron96t260f&st=eiezm8gw&raw=1', 'The Super Toys (A Castastics Story)')"><img src="posters/movie6.jpg"><p>Movie 6</p></div>
            <div class="card" onclick="playMedia('https://www.dropbox.com/scl/fi/hymc8ynygh76oev3vlq5s/The-Idiotastics-Movie-A-Castastics-Story.mp4?rlkey=ukb8jjdm9nwjtu69klm5zwe2h&st=x8erf7ek&raw=1', 'The Idiotastics Movie (A Castastics Story)')"><img src="posters/movie7.jpg"><p>Movie 7</p></div>
            <div class="card" onclick="playMedia('https://www.dropbox.com/scl/fi/220ggzu9jfvw151xeon7b/The-Castastics-1-Rise-Of-The-Castastics-Killer.mp4?rlkey=eqqc4fuux6xeqs1clk7808aa0&st=ytb2jm2m&raw=1', 'The Castastics 1½ (Rise Of The Castastics Killer)')"><img src="posters/movie8.jpg"><p>Movie 8</p></div>
            <div class="card" onclick="playMedia('https://www.dropbox.com/scl/fi/m0o211xk5gvpyyvg0ebke/The-Castastics-Movie-Theatrical-Cut-Shorter-Version.mp4?rlkey=s3is4cycijqc03krxb6nrdkov&st=iq3ugxnj&raw=1', 'The Castastics Movie - Theatrical Cut [Shorter Version]')"><img src="posters/movie9.jpg"><p>Movie 9</p></div>
        </div>

        <div class="section-title">TV SHOWS</div>
        <div class="grid">
            
            <div class="card">
                <img src="posters/castastics_show.jpg">
                <p>The Castastics</p>
                <select onchange="playMedia(this.value, 'The Castastics ' + this.options[this.selectedIndex].text)">
                    <option value="">Select Episode</option>
                    <optgroup label="S1 (8 Eps)"><option value="videos/castastics/s1/ep1.mp4">S1 Ep1</option></optgroup>
                    <optgroup label="S2 (17 Eps)"><option value="videos/castastics/s2/ep1.mp4">S2 Ep1</option></optgroup>
                    <optgroup label="S3 (5 Eps)"><option value="videos/castastics/s3/ep1.mp4">S3 Ep1</option></optgroup>
                    <optgroup label="S4 (30 Eps)"><option value="videos/castastics/s4/ep1.mp4">S4 Ep1</option></optgroup>
                    <optgroup label="S5 (21 Eps)"><option value="videos/castastics/s5/ep1.mp4">S5 Ep1</option></optgroup>
                </select>
            </div>

            <div class="card">
                <img src="posters/idiotastics_show.jpg">
                <p>The Idiotastics</p>
                <select onchange="playMedia(this.value, 'The Idiotastics ' + this.options[this.selectedIndex].text)">
                    <option value="">Select Episode</option>
                    <optgroup label="S1 (6 Eps)"><option value="videos/idiotastics/s1/ep1.mp4">S1 Ep1</option></optgroup>
                    <optgroup label="S2 (6 Eps)"><option value="videos/idiotastics/s2/ep1.mp4">S2 Ep1</option></optgroup>
                    <optgroup label="S3 (6 Eps)"><option value="videos/idiotastics/s3/ep1.mp4">S3 Ep1</option></optgroup>
                </select>
            </div>
        </div>
    </div>

    <script>
        function playMedia(link, title) {
            if (!link || link.includes('DRIVE_ID')) return;
            const display = document.getElementById('video-display');
            const container = document.getElementById('player-container');
            const text = document.getElementById('now-playing');

            display.style.display = "block";
            text.innerText = "NOW PLAYING: " + title;

            // Adding all the 'allow' attributes unlocks the Full Screen square box
            container.innerHTML = `
                <video id="main-player" controls playsinline webkitallowfullscreen mozallowfullscreen allowfullscreen autoplay>
                    <source src="${link}" type="video/mp4">
                    Your browser does not support the video tag.
                </video>`;

            window.scrollTo({top: 0, behavior: 'smooth'});
        }
    </script>
</body>
</html>
